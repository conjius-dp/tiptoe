name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-test-macos:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: brew install ccache lcov

      - name: Cache JUCE
        id: cache-juce
        uses: actions/cache@v4
        with:
          path: JUCE
          key: juce-8.0.12

      - name: Clone JUCE
        if: steps.cache-juce.outputs.cache-hit != 'true'
        run: git clone --depth 1 --branch 8.0.12 https://github.com/juce-framework/JUCE.git JUCE

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/ccache
          key: ccache-ci-${{ hashFiles('Source/**', 'Tests/**', 'CMakeLists.txt') }}
          restore-keys: ccache-ci-

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER_LAUNCHER=ccache -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_FLAGS="--coverage" -DCMAKE_C_FLAGS="--coverage"

      - name: Build all targets
        run: cmake --build build

      - name: ccache stats
        run: ccache -s

      - name: Run tests
        run: ./build/TiptoeTests

      - name: Validate VST3 with pluginval
        run: |
          curl -LO https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_macOS.zip
          unzip pluginval_macOS.zip
          pluginval.app/Contents/MacOS/pluginval --validate build/Tiptoe_artefacts/Release/VST3/tiptoe.vst3 --strictness-level 5

      - name: Generate coverage report
        run: |
          lcov --capture --directory build --output-file coverage.info \
               --ignore-errors inconsistent,format,count
          lcov --remove coverage.info '*/JUCE/*' '*/tests/*' '/usr/*' '*/build/*' '*/Frameworks/*' \
               --output-file coverage.info --ignore-errors unused,inconsistent,format
          lcov --list coverage.info --ignore-errors inconsistent,format

      - name: Generate HTML coverage report
        run: |
          genhtml coverage.info --output-directory coverage-html \
                 --ignore-errors inconsistent,format,category,source
          mkdir -p docs
          rm -rf docs/coverage
          cp -r coverage-html docs/coverage

      - name: Update coverage badge and report
        if: github.ref == 'refs/heads/main'
        run: |
          LINE_PCT=$(lcov --summary coverage.info --ignore-errors inconsistent,format 2>&1 | grep 'lines\.\.\.' | sed 's/.*: *\([0-9.]*\)%.*/\1/')
          echo "Line coverage: ${LINE_PCT}%"

          if [ "$(echo "$LINE_PCT >= 80" | bc)" -eq 1 ]; then
            COLOR="brightgreen"
          elif [ "$(echo "$LINE_PCT >= 60" | bc)" -eq 1 ]; then
            COLOR="yellow"
          else
            COLOR="red"
          fi

          mkdir -p docs/badges
          curl -s "https://img.shields.io/badge/coverage-${LINE_PCT}%25-${COLOR}" > docs/badges/coverage.svg

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/badges/coverage.svg docs/coverage
          if git diff --cached --quiet; then
            echo "Coverage unchanged, skipping commit"
          else
            git commit -m "Update coverage to ${LINE_PCT}%"
            git pull --rebase -X theirs origin main || (git rebase --abort && git pull origin main --no-edit && git push && exit 0)
            git push
          fi

  build-and-test-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache JUCE
        id: cache-juce
        uses: actions/cache@v4
        with:
          path: JUCE
          key: juce-8.0.12

      - name: Clone JUCE
        if: steps.cache-juce.outputs.cache-hit != 'true'
        run: git clone --depth 1 --branch 8.0.12 https://github.com/juce-framework/JUCE.git JUCE

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build VST3
        run: cmake --build build --config Release --target Tiptoe_VST3

      - name: Build Tests
        run: cmake --build build --config Release --target TiptoeTests

      - name: Run tests
        run: |
          $exe = Get-ChildItem -Path build -Recurse -Filter TiptoeTests.exe | Select-Object -First 1
          Write-Host "Found test executable: $($exe.FullName)"
          & $exe.FullName
        shell: pwsh

      - name: Validate VST3 with pluginval
        run: |
          Invoke-WebRequest -Uri https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_Windows.zip -OutFile pluginval_Windows.zip
          Expand-Archive pluginval_Windows.zip -DestinationPath pluginval
          pluginval\pluginval.exe --validate build\Tiptoe_artefacts\Release\VST3\tiptoe.vst3 --strictness-level 5
        shell: pwsh
