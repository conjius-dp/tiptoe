name: Nightly

# Release-mode build smoke test on every PR: compiles the VST3 and AU on
# macOS and the VST3 on Windows and fails the check if any build fails.
# No artifacts are zipped or uploaded; tagged releases off main are the
# only place final binaries are produced (see release.yml).
on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ccache
        run: brew install ccache

      - name: Cache JUCE
        id: cache-juce
        uses: actions/cache@v4
        with:
          path: JUCE
          key: juce-8.0.12

      - name: Clone JUCE
        if: steps.cache-juce.outputs.cache-hit != 'true'
        run: git clone --depth 1 --branch 8.0.12 https://github.com/juce-framework/JUCE.git JUCE

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/ccache
          key: ccache-nightly-${{ hashFiles('Source/**', 'CMakeLists.txt') }}
          restore-keys: ccache-nightly-

      - name: Configure (Release)
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER_LAUNCHER=ccache -DCMAKE_C_COMPILER_LAUNCHER=ccache

      - name: Build VST3 + AU
        run: cmake --build build --target Tiptoe_VST3 Tiptoe_AU

  build-windows:
    runs-on: windows-latest
    env:
      SCCACHE_DIR: ${{ github.workspace }}\sccache
      SCCACHE_CACHE_SIZE: 2G

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Setup MSVC dev environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Cache JUCE
        id: cache-juce
        uses: actions/cache@v4
        with:
          path: JUCE
          key: juce-8.0.12

      - name: Clone JUCE
        if: steps.cache-juce.outputs.cache-hit != 'true'
        run: git clone --depth 1 --branch 8.0.12 https://github.com/juce-framework/JUCE.git JUCE

      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: sccache-nightly-windows-${{ hashFiles('Source/**', 'CMakeLists.txt') }}
          restore-keys: sccache-nightly-windows-

      - name: Configure (Release)
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER_LAUNCHER=sccache -DCMAKE_C_COMPILER_LAUNCHER=sccache

      - name: Build VST3
        run: cmake --build build --target Tiptoe_VST3
