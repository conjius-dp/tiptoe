name: Release

on:
  workflow_dispatch:
  workflow_run:
    workflows: [CI]
    types: [completed]
    # All branches — main releases as stable, everything else as nightly.

permissions:
  contents: write
  actions: write
  pull-requests: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-changes:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.channel.outputs.should_release }}
      channel: ${{ steps.channel.outputs.channel }}
      branch: ${{ steps.channel.outputs.branch }}
      head_sha: ${{ steps.channel.outputs.head_sha }}
      plugin_changed: ${{ steps.filter.outputs.plugin_changed }}
      version: ${{ steps.version.outputs.version }}
      full_version: ${{ steps.version.outputs.full_version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Determine branch, channel, and whether to release
        id: channel
        env:
          GH_TOKEN: ${{ github.token }}
        # Release rules:
        #   main                                  => stable (always)
        #   non-main with an OPEN PR targeting main => nightly
        #   non-main with no open PR              => skip release
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BRANCH="${{ github.ref_name }}"
            SHA="${{ github.sha }}"
          else
            BRANCH="${{ github.event.workflow_run.head_branch }}"
            SHA="${{ github.event.workflow_run.head_sha }}"
          fi

          SHOULD_RELEASE=false
          CHANNEL=""
          if [ "$BRANCH" = "main" ]; then
            CHANNEL=stable
            SHOULD_RELEASE=true
          else
            PR_COUNT=$(gh pr list --repo "${{ github.repository }}" --head "$BRANCH" --state open --json number --jq 'length')
            if [ "${PR_COUNT:-0}" -gt 0 ]; then
              CHANNEL=nightly
              SHOULD_RELEASE=true
            else
              echo "Branch '$BRANCH' has no open PR — skipping release."
            fi
          fi

          echo "branch=$BRANCH"                 >> "$GITHUB_OUTPUT"
          echo "head_sha=$SHA"                  >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL"               >> "$GITHUB_OUTPUT"
          echo "should_release=$SHOULD_RELEASE" >> "$GITHUB_OUTPUT"
          echo "Branch: $BRANCH  Channel: $CHANNEL  Release: $SHOULD_RELEASE"

      - name: Checkout triggering commit
        if: steps.channel.outputs.should_release == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.channel.outputs.head_sha }}

      - name: Check for plugin code changes since last release
        if: steps.channel.outputs.should_release == 'true'
        id: filter
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            echo "No previous release tag found, proceeding with release"
            echo "plugin_changed=true" >> "$GITHUB_OUTPUT"
          else
            CHANGED=$(git diff --name-only "$LAST_TAG"..HEAD -- Source/ Tests/ Tools/ Assets/ CMakeLists.txt .github/workflows/ ':(exclude)Assets/badges/*')
            if [ -n "$CHANGED" ]; then
              echo "plugin_changed=true" >> "$GITHUB_OUTPUT"
              echo "Plugin files changed since $LAST_TAG:"
              echo "$CHANGED"
            else
              echo "plugin_changed=false" >> "$GITHUB_OUTPUT"
              echo "No plugin files changed since $LAST_TAG, skipping release"
            fi
          fi

      - name: Compute next version
        if: steps.channel.outputs.should_release == 'true'
        id: version
        run: |
          CURRENT=$(sed -n 's/.*project(Tiptoe VERSION \([0-9]*\.[0-9]*\.[0-9]*\)).*/\1/p' CMakeLists.txt)
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
          CHANNEL="${{ steps.channel.outputs.channel }}"
          FULL="${NEW_VERSION}-${CHANNEL}"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "full_version=$FULL" >> "$GITHUB_OUTPUT"
          echo "tag=v${FULL}" >> "$GITHUB_OUTPUT"
          echo "Next release: v${FULL}"

  build-macos:
    needs: check-changes
    if: needs.check-changes.outputs.should_release == 'true' && needs.check-changes.outputs.plugin_changed == 'true'
    runs-on: macos-15
    env:
      FULL_VERSION: ${{ needs.check-changes.outputs.full_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.check-changes.outputs.head_sha }}

      - name: Install ccache
        run: brew install ccache

      - name: Cache JUCE
        id: cache-juce
        uses: actions/cache@v4
        with:
          path: JUCE
          key: juce-8.0.12

      - name: Clone JUCE
        if: steps.cache-juce.outputs.cache-hit != 'true'
        run: git clone --depth 1 --branch 8.0.12 https://github.com/juce-framework/JUCE.git JUCE

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/ccache
          key: ccache-release-${{ hashFiles('Source/**', 'CMakeLists.txt') }}
          restore-keys: ccache-release-

      - name: Configure (Release)
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER_LAUNCHER=ccache -DCMAKE_C_COMPILER_LAUNCHER=ccache

      - name: Build plugin + screenshot (parallel)
        # Single invocation builds all targets in parallel — reuses JUCE module
        # objects across them so we don't recompile JUCE multiple times.
        run: cmake --build build --target Tiptoe_VST3 Tiptoe_AU TiptoeScreenshot

      - name: Render screenshot PNG
        run: ./build/TiptoeScreenshot screenshot.png

      - name: Zip VST3
        run: |
          cd build/Tiptoe_artefacts/Release/VST3
          zip -r "$GITHUB_WORKSPACE/tiptoe-${FULL_VERSION}-macos-vst3.zip" tiptoe.vst3

      - name: Zip AU
        run: |
          cd build/Tiptoe_artefacts/Release/AU
          zip -r "$GITHUB_WORKSPACE/tiptoe-${FULL_VERSION}-macos-au.zip" tiptoe.component

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: |
            tiptoe-${{ env.FULL_VERSION }}-macos-vst3.zip
            tiptoe-${{ env.FULL_VERSION }}-macos-au.zip

      - name: Upload screenshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: screenshot
          path: screenshot.png

      - name: Cancel workflow if this job failed
        if: failure()
        uses: andymckay/cancel-action@0.5

  build-windows:
    needs: check-changes
    if: needs.check-changes.outputs.should_release == 'true' && needs.check-changes.outputs.plugin_changed == 'true'
    runs-on: windows-latest
    env:
      FULL_VERSION: ${{ needs.check-changes.outputs.full_version }}
      # Local disk cache for sccache (GHA backend is flaky).
      SCCACHE_DIR: ${{ github.workspace }}\sccache
      SCCACHE_CACHE_SIZE: 2G

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.check-changes.outputs.head_sha }}

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Setup MSVC dev environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Cache JUCE
        id: cache-juce
        uses: actions/cache@v4
        with:
          path: JUCE
          key: juce-8.0.12

      - name: Clone JUCE
        if: steps.cache-juce.outputs.cache-hit != 'true'
        run: git clone --depth 1 --branch 8.0.12 https://github.com/juce-framework/JUCE.git JUCE

      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: sccache-release-windows-${{ hashFiles('Source/**', 'CMakeLists.txt') }}
          restore-keys: sccache-release-windows-

      - name: Cache CMake build directory
        uses: actions/cache@v4
        with:
          path: build
          key: build-release-windows-${{ hashFiles('Source/**', 'Tools/**', 'CMakeLists.txt', '.github/workflows/release.yml') }}
          restore-keys: build-release-windows-

      - name: Configure (Release)
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER_LAUNCHER=sccache -DCMAKE_C_COMPILER_LAUNCHER=sccache

      - name: Build VST3
        run: cmake --build build --target Tiptoe_VST3

      - name: Zip VST3
        shell: pwsh
        run: Compress-Archive -Path "build\Tiptoe_artefacts\Release\VST3\tiptoe.vst3" -DestinationPath "tiptoe-${env:FULL_VERSION}-windows-vst3.zip"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: tiptoe-${{ env.FULL_VERSION }}-windows-vst3.zip

      - name: Cancel workflow if this job failed
        if: failure()
        uses: andymckay/cancel-action@0.5

  release:
    needs: [check-changes, build-macos, build-windows]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.check-changes.outputs.version }}
      FULL_VERSION: ${{ needs.check-changes.outputs.full_version }}
      CHANNEL: ${{ needs.check-changes.outputs.channel }}
      TAG: ${{ needs.check-changes.outputs.tag }}
      BRANCH: ${{ needs.check-changes.outputs.branch }}

    steps:
      - name: Checkout triggering commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.check-changes.outputs.head_sha }}

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-artifacts

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-artifacts

      - name: Download screenshot artifact
        uses: actions/download-artifact@v4
        with:
          name: screenshot
          path: screenshot-dir

      - name: Publish screenshot to gh-pages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPO_URL="https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          TMPDIR=$(mktemp -d)
          if ! git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git clone "$REPO_URL" "$TMPDIR"
            cd "$TMPDIR"
            git checkout --orphan gh-pages
            git rm -rf . 2>/dev/null || true
          else
            git clone --branch gh-pages --depth 1 "$REPO_URL" "$TMPDIR"
            cd "$TMPDIR"
          fi
          cp "$GITHUB_WORKSPACE/screenshot-dir/screenshot.png" ./screenshot.png
          touch .nojekyll
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update plugin screenshot" || true
          git push origin gh-pages
          cd "$GITHUB_WORKSPACE"

      - name: Bump CMakeLists version
        run: |
          CURRENT=$(sed -n 's/.*project(Tiptoe VERSION \([0-9]*\.[0-9]*\.[0-9]*\)).*/\1/p' CMakeLists.txt)
          sed -i "s/project(Tiptoe VERSION ${CURRENT})/project(Tiptoe VERSION ${VERSION})/" CMakeLists.txt

      - name: Commit version bump
        # We're on a detached HEAD (checked out head_sha), so push explicitly
        # back to the branch that triggered this release.
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CMakeLists.txt
          git commit -m "Bump version to ${TAG}"
          git push origin "HEAD:refs/heads/${BRANCH}"

      - name: Tag release
        run: |
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: tiptoe ${{ env.FULL_VERSION }}
          body: |
            **Artifacts:**
            - `tiptoe-${{ env.FULL_VERSION }}-macos-vst3.zip` — macOS VST3 plugin
            - `tiptoe-${{ env.FULL_VERSION }}-macos-au.zip` — macOS AU plugin
            - `tiptoe-${{ env.FULL_VERSION }}-windows-vst3.zip` — Windows VST3 plugin
          files: |
            tiptoe-${{ env.FULL_VERSION }}-macos-vst3.zip
            tiptoe-${{ env.FULL_VERSION }}-macos-au.zip
            tiptoe-${{ env.FULL_VERSION }}-windows-vst3.zip
